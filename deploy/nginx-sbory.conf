# TLS терминируется на 8080: порт 443 на сервере занят SNI-роутером
# (/etc/nginx/stream.d/sni.conf, ssl_preread), который направляет
# sbory.mirobase.ru -> 127.0.0.1:8080, а неизвестные SNI -> Xray VPN.
# Не менять listen на 443 — уронит reload (конфликт с stream-сокетом).
server {
    listen 8080 ssl http2;
    listen [::]:8080 ssl http2;
    server_name sbory.mirobase.ru;

    ssl_certificate /etc/letsencrypt/live/sbory.mirobase.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sbory.mirobase.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSE: без буферизации, длинный таймаут
    location /api/events {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name sbory.mirobase.ru;
    return 301 https://$host$request_uri;
}
